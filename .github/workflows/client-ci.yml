# Next.js client — CI GitHub Actions (équivalent esprit GitLab : deps → test → build → qualité / sécurité).
# Pas de conteneur : build et tests tournent sur le runner Ubuntu avec pnpm.
# Ce workflow n’est pas un « déploiement prod » : `pnpm install` garde les devDependencies (ESLint, Jest, types…)
# nécessaires au lint / tests / build. La prod livrable = autre chaîne (ex. artefact `next build` + Node sur le VPS, systemd, reverse-proxy — **sans Docker**).
#
# Validateurs IDE : `vars.CLIENT_SONARCLOUD_ENABLED` et `secrets.SONAR_TOKEN` peuvent être signalés comme
# « invalides » — ce sont des noms valides côté GitHub (variable dépôt + secret SonarCloud). Voir `.github/actionlint.yaml`.
#
# Étape par étape (outils externes) :
# - SonarCloud (désactivé par défaut) : le job Sonar ne s’exécute que si **les deux** conditions sont vraies :
#   1) variable dépôt `CLIENT_SONARCLOUD_ENABLED=true` ; 2) fichier versionné **`client/sonar-project.properties`**
#   (copie depuis `sonar-project.properties.example`, remplir organization + projectKey sur https://sonarcloud.io).
#   Secret dépôt `SONAR_TOKEN` requis quand le job tourne.
# - Trivy / Gitleaks : jobs activés par défaut ; ajuste exit-code Trivy (0 → 1) quand tu veux bloquer la CI.
#
# Déclenchement : push / PR sur la branche feature/test-ci uniquement (+ chemins client) ; manuel : workflow_dispatch.

name: Client CI (Next.js)

on:
  push:
    branches:
      - feature/test-ci
    paths:
      - "client/**"
      - ".github/workflows/client-ci.yml"
  pull_request:
    branches:
      - feature/test-ci
    paths:
      - "client/**"
      - ".github/workflows/client-ci.yml"
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Lancer Playwright e2e (plus lent, installe Chromium)"
        type: boolean
        default: false

concurrency:
  group: client-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: client

env:
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_ENV: production
  NEXT_PUBLIC_SITE_URL: http://localhost:3001
  NEXT_PUBLIC_AUTH_API: http://localhost:3000

jobs:
  # Lit les variables dépôt une fois ; les jobs suivants évitent `vars.*` dans `if:` (meilleure compat. validateurs IDE).
  ci-config:
    name: CI config
    runs-on: ubuntu-latest
    timeout-minutes: 2
    defaults:
      run:
        working-directory: .
    outputs:
      sonarcloud: ${{ steps.flags.outputs.sonarcloud }}
    steps:
      - uses: actions/checkout@v4

      - id: flags
        run: |
          enabled="${{ vars.CLIENT_SONARCLOUD_ENABLED }}"
          if [ "$enabled" = "true" ] && [ -f client/sonar-project.properties ]; then
            echo "sonarcloud=true" >> "$GITHUB_OUTPUT"
          else
            echo "sonarcloud=false" >> "$GITHUB_OUTPUT"
          fi

  # --- Équivalent dependencies + test + build (lint inclus) ---
  install-lint-test-build:
    name: Install · lint · unit tests · build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test:unit

      - name: Build
        run: pnpm run build

  # --- Playwright (optionnel, manuel ou workflow_dispatch avec run_e2e) ---
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' && inputs.run_e2e == true
    needs: [install-lint-test-build]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run e2e
        run: pnpm run test:e2e

  # --- Qualité : SonarCloud (désactivé tant que CLIENT_SONARCLOUD_ENABLED != true) ---
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: needs.ci-config.outputs.sonarcloud == 'true'
    needs: [ci-config, install-lint-test-build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # SonarQube Cloud : même action que celle recommandée par Sonar (SONAR_TOKEN + client/sonar-project.properties).
      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: client

  # --- Sécurité : Trivy filesystem (sans registry) ---
  trivy-fs:
    name: Trivy FS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [install-lint-test-build]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (fs)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ./client
          severity: HIGH,CRITICAL
          exit-code: "0"

  # --- Sécurité : Trivy config (scan IaC si fichiers du type compose / k8s / Dockerfile présents dans client/) ---
  trivy-config:
    name: Trivy config
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install-lint-test-build]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy config scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: ./client
          severity: HIGH,CRITICAL
          exit-code: "0"

  # --- Sécrets dans le dépôt ---
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
