# Next.js client — CI GitHub Actions (équivalent esprit GitLab : deps → test → build → qualité / sécurité).
# Pas d’image Docker : build et tests tournent sur le runner Ubuntu avec pnpm.
#
# Validateurs IDE : `vars.CLIENT_SONARCLOUD_ENABLED` et `secrets.SONAR_TOKEN` peuvent être signalés comme
# « invalides » — ce sont des noms valides côté GitHub (variable dépôt + secret SonarCloud). Voir `.github/actionlint.yaml`.
#
# Étape par étape (outils externes) :
# - SonarCloud : créer un projet sur https://sonarcloud.io , copier client/sonar-project.properties.example
#   vers client/sonar-project.properties (remplir organization + projectKey), ajouter le secret SONAR_TOKEN
#   au dépôt, puis activer la variable dépôt CLIENT_SONARCLOUD_ENABLED=true (Settings → Variables).
# - Trivy / Gitleaks : jobs activés par défaut ; ajuste exit-code Trivy (0 → 1) quand tu veux bloquer la CI.
#
# Déclenchement : push / PR sur la branche feature/test-ci uniquement (+ chemins client) ; manuel : workflow_dispatch.

name: Client CI (Next.js)

on:
  push:
    branches:
      - feature/test-ci
    paths:
      - "client/**"
      - ".github/workflows/client-ci.yml"
  pull_request:
    branches:
      - feature/test-ci
    paths:
      - "client/**"
      - ".github/workflows/client-ci.yml"
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Lancer Playwright e2e (plus lent, installe Chromium)"
        type: boolean
        default: false

concurrency:
  group: client-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: client

env:
  NODE_ENV: production
  NEXT_PUBLIC_SITE_URL: http://localhost:3001
  NEXT_PUBLIC_AUTH_API: http://localhost:3000

jobs:
  # Lit les variables dépôt une fois ; les jobs suivants évitent `vars.*` dans `if:` (meilleure compat. validateurs IDE).
  ci-config:
    name: CI config
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      sonarcloud: ${{ steps.flags.outputs.sonarcloud }}
    steps:
      - id: flags
        run: echo "sonarcloud=${{ vars.CLIENT_SONARCLOUD_ENABLED }}" >> "$GITHUB_OUTPUT"

  # --- Équivalent dependencies + test + build (lint inclus) ---
  install-lint-test-build:
    name: Install · lint · unit tests · build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test:unit

      - name: Build
        run: pnpm run build

  # --- Playwright (optionnel, manuel ou workflow_dispatch avec run_e2e) ---
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' && inputs.run_e2e == true
    needs: [install-lint-test-build]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run e2e
        run: pnpm run test:e2e

  # --- Qualité : SonarCloud (désactivé tant que CLIENT_SONARCLOUD_ENABLED != true) ---
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: needs.ci-config.outputs.sonarcloud == 'true'
    needs: [ci-config, install-lint-test-build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # SonarQube Cloud : même action que celle recommandée par Sonar (SONAR_TOKEN + client/sonar-project.properties).
      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: client

  # --- Sécurité : Trivy filesystem (sans registry) ---
  trivy-fs:
    name: Trivy FS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [install-lint-test-build]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (fs)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ./client
          severity: HIGH,CRITICAL
          # Passe à exit-code: '1' quand tu veux faire échouer la CI comme ton GitLab
          exit-code: "0"

  # --- Sécurité : Trivy IaC / config (Dockerfile, compose, k8s yaml si présents) ---
  trivy-config:
    name: Trivy config
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install-lint-test-build]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy config scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: ./client
          severity: HIGH,CRITICAL
          exit-code: "0"

  # --- Sécrets dans le dépôt ---
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
