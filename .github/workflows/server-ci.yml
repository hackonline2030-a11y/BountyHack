# API NestJS / Nx — CI GitHub Actions (deps → lint → tests → build → Gitleaks).
# Pas de conteneur, pas de registre d’images, pas de Trivy / Sonar / analyse d’image.
# `pnpm install` garde les devDependencies (ESLint, Jest, Nx…) nécessaires au lint / tests / build.
#
# Déclenchement : push / PR sur la branche feature/test-ci uniquement (chemins server) ; manuel : workflow_dispatch.

name: Server CI (NestJS / Nx)

on:
  push:
    branches:
      - feature/test-ci
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"
  pull_request:
    branches:
      - feature/test-ci
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"
  workflow_dispatch:

concurrency:
  group: server-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: server

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true

jobs:
  install-lint-test-build:
    name: Install · lint · unit tests · build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.9.0

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: server/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec nx run web-api:lint

      - name: Unit tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
